# Mockery configuration for Raioz
# Documentation: https://github.com/vektra/mockery

# Enable expecter-based mocking (recommended)
with-expecter: true

# Disable version checking (optional, for CI)
disable-version-string: false

# Output configuration
mockname: "Mock{{.InterfaceName}}"
filename: "{{.InterfaceName | snakecase }}.go"
dir: "{{.InterfaceDir}}/mocks"

# Packages to generate mocks for
# Note: Currently no interfaces exist, so this is prepared for future use
# When interfaces are created, uncomment and configure the relevant packages

packages:
  # Example configuration (uncomment when interfaces are created):
  # raioz/internal/docker:
  #   interfaces:
  #     DockerRunner:
  #       config:
  #         dir: "internal/mocks/docker"
  # raioz/internal/git:
  #   interfaces:
  #     GitService:
  #       config:
  #         dir: "internal/mocks/git"
  # raioz/internal/workspace:
  #   interfaces:
  #     WorkspaceManager:
  #       config:
  #         dir: "internal/mocks/workspace"

# Note: This file is prepared for future use when interfaces are created.
# Current mocks in internal/mocks/ are manual and will be replaced
# when interfaces and mockery are fully integrated.
