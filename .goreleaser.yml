version: 2

builds:
  - main: ./cmd/raioz
    binary: raioz
    ldflags:
      - -s -w
      - -X raioz/internal/cli.Version=v{{.Version}}
      - -X raioz/internal/cli.Commit={{.ShortCommit}}
      - -X raioz/internal/cli.BuildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "raioz_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^style:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Refactoring
      regexp: "^refactor"
    - title: Documentation
      regexp: "^docs"
    - title: Build
      regexp: "^build"
