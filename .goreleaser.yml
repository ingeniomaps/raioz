version: 2

builds:
  - main: ./cmd/raioz
    binary: raioz
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.Commit}}
      - -X main.date={{.Date}}
    # Windows is intentionally excluded — raioz uses Unix-only syscalls
    # (SysProcAttr.Setpgid, syscall.Kill, syscall.Statfs) for host-process
    # lifecycle and disk-space preflight. Windows users run raioz from WSL2,
    # which uses the linux_amd64 binary. Revisit when host_runner and
    # preflight get platform-split build tags.
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "raioz_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^style:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Refactoring
      regexp: "^refactor"
    - title: Documentation
      regexp: "^docs"
    - title: Build
      regexp: "^build"
