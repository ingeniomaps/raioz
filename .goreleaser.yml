version: 2

builds:
  - main: ./cmd/raioz
    binary: raioz
    ldflags:
      - -s -w
      - -X raioz/internal/cli.Version=v{{.Version}}
      - -X raioz/internal/cli.Commit={{.ShortCommit}}
      - -X raioz/internal/cli.BuildDate={{.Date}}
    hooks:
      # Guard against the ldflags-package mismatch that produced
      # unstamped v0.4.0 / v0.5.x binaries. The script self-skips
      # on non-runnable cross-builds and aborts goreleaser BEFORE
      # the archive/publish phase if the linux/amd64 binary is
      # unstamped. See docs/issues/019.
      post:
        - cmd: ./scripts/verify-stamp.sh "{{ .Path }}" "v{{ .Version }}"
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64

archives:
  - formats: [tar.gz]
    name_template: "raioz_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^test:"
      - "^style:"
      - "^chore:"
  groups:
    - title: Features
      regexp: "^feat"
    - title: Bug Fixes
      regexp: "^fix"
    - title: Refactoring
      regexp: "^refactor"
    - title: Documentation
      regexp: "^docs"
    - title: Build
      regexp: "^build"
