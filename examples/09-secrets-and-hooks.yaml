# 09 — Secrets and hooks: Vault, Infisical, Doppler integration
#
# Raioz doesn't manage secrets. It runs YOUR commands before starting.
# The `pre` field executes before any service starts.
# The `post` field executes after all services start.
#
# Common patterns:
#   - Infisical: infisical export --env=dev > .env
#   - Vault: vault kv get -format=json secret/dev > .env
#   - Doppler: doppler secrets download --no-file --format env > .env
#   - 1Password: op inject -i .env.template -o .env
#   - AWS SSM: aws ssm get-parameters-by-path ...
#   - Custom script: ./scripts/fetch-secrets.sh
#
# If the pre hook FAILS, raioz stops. No services start without secrets.

project: secure-app

# Single command
pre: infisical export --env=dev > .env

# Or multiple commands (all must succeed)
# pre:
#   - infisical login --silent
#   - infisical export --env=dev > .env
#   - infisical export --env=dev --path=/infra > .env.infra

# Cleanup after services start (secrets already injected into containers)
post: rm -f .env .env.infra

services:
  api:
    path: ./api
    dependsOn: [postgres]
    # api/.env is loaded automatically (Raioz finds .env in service dir)
    # OR specify explicitly:
    env: .env.api

  frontend:
    path: ./frontend
    dependsOn: [api]

dependencies:
  postgres:
    image: postgres:16
    ports: ["5432"]
    # Dependency-specific env file (for POSTGRES_PASSWORD, etc.)
    env: .env.postgres

  redis:
    image: redis:7
    # Redis has no required env vars — no env field needed
