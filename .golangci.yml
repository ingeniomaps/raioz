# Golangci-lint configuration for raioz.
#
# Pragmatic baseline for v0.1.0. Keeps high-signal checks (govet,
# staticcheck, unused, ineffassign, gofmt, goimports) and lightweight
# style checks (misspell, whitespace, copyloopvar). Heavyweight /
# opinionated linters (wrapcheck, revive, gocritic's experimental tags,
# err113, gocyclo, funlen, errcheck's strict mode) are intentionally
# off — they fire thousands of issues on a mature CLI codebase and
# most are false positives for this style of error-handling (CLI
# commands with best-effort cleanup paths).
#
# Plan: re-enable them gradually, one at a time, with focused clean-up
# PRs post-v0.1.0.

run:
  timeout: 5m
  tests: true

linters-settings:
  gofmt:
    simplify: true
  goimports:
    local-prefixes: raioz
  gosec:
    # G204 (subprocess launched with tainted input) and G306 (WriteFile
    # permissions) are disabled globally — see issues.exclude-rules below
    # for the rationale.
    excludes:
      - G204
      - G306

linters:
  disable-all: true
  enable:
    - govet
    - staticcheck
    - unused
    - ineffassign
    - gofmt
    - goimports
    - misspell
    - whitespace
    - copyloopvar
    - bodyclose
    - errcheck
    - gosec

issues:
  exclude-dirs:
    - vendor
    - node_modules
  exclude-files:
    - ".*\\.pb\\.go$"
    - ".*\\.generated\\.go$"
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
  exclude-rules:
    # Tests frequently pass nil Context to helpers we control. Staticcheck
    # flags this but the intent is exactly what nil means here (no cancel,
    # no deadline); context.TODO() would be pedantry.
    - path: _test\.go
      text: "SA1012"
      linters:
        - staticcheck

    # Empty branches are often intentional in tests (placeholder assertions
    # the table doesn't exercise). Keep the check on production code.
    - path: _test\.go
      text: "SA9003"
      linters:
        - staticcheck

    # Spanish strings in i18n unit tests aren't misspellings.
    - path: internal/i18n/i18n_test\.go
      linters:
        - misspell

    # Tests frequently ignore error returns on os.Setenv / os.Remove /
    # file cleanup helpers. The signal we care about from errcheck lives
    # in production code; mechanical _ = on every test helper would add
    # noise without catching real bugs.
    - path: _test\.go
      linters:
        - errcheck

    # Tests legitimately bind to ephemeral ports, write fixture files with
    # 0644, and shell out to docker with dynamic args. Gosec's security
    # model doesn't fit test code — the signal is in production.
    - path: _test\.go
      linters:
        - gosec

    # G204 (subprocess launched with variable) — raioz is an orchestrator.
    # Every call to exec.Command* uses the configured runtime binary
    # (docker/podman/nerdctl) with args built from the user's raioz.yaml
    # (image names, container names, ports). The user operates the tool;
    # the inputs are not attacker-controlled. Excluded in linters-settings.
    #
    # G306 (WriteFile permissions) — raioz writes generated config files
    # (Caddyfile, compose overlays, raioz.yaml from `init`, route
    # manifests, state files) where 0644 is the expected UNIX-friendly
    # mode. None of them contain secrets — credentials live in the user's
    # own `.env.*` files which raioz only reads. Forcing 0600 would break
    # the common case where a team commits raioz.yaml to git and other
    # user accounts need to read the compose overlay. Excluded in
    # linters-settings.

output:
  formats:
    - format: colored-line-number
  print-issued-lines: true
  print-linter-name: true
