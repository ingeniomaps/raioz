version: "2"
run:
  tests: true
output:
  formats:
    text:
      path: stdout
      print-linter-name: true
      print-issued-lines: true
linters:
  default: none
  enable:
    - bodyclose
    - copyloopvar
    - errcheck
    - gosec
    - govet
    - ineffassign
    - misspell
    - revive
    - staticcheck
    - unused
    - whitespace
    - wrapcheck
  settings:
    gosec:
      excludes:
        - G204
        - G306
        # G702 (command injection via taint) — raioz orchestrates other
        # binaries by design (`kind: meta` spawns `raioz`, runners spawn
        # docker/compose); user-controlled args are the contract.
        - G702
        # G703 (path traversal via taint) — config-file paths,
        # $RAIOZ_HOME overrides, and project cwds are all intentional
        # user-supplied inputs. Same class as G306.
        - G703
    revive:
      rules:
        - name: redefines-builtin-id
        - name: empty-block
        - name: var-declaration
        - name: var-naming
        - name: unreachable-code
        - name: if-return
        - name: indent-error-flow
        - name: superfluous-else
        - name: errorf
        - name: error-return
        - name: error-strings
        - name: error-naming
        - name: context-as-argument
        - name: context-keys-type
        - name: time-naming
        - name: range
        - name: blank-imports
    wrapcheck:
      ignore-package-globs:
        - raioz/internal/**
  exclusions:
    generated: lax
    presets:
      - comments
      - common-false-positives
      - legacy
      - std-error-handling
    rules:
      - linters:
          - staticcheck
        path: _test\.go
        text: SA1012
      - linters:
          - staticcheck
        path: _test\.go
        text: SA9003
      - linters:
          - misspell
        path: internal/i18n/i18n_test\.go
      - linters:
          - errcheck
        path: _test\.go
      - linters:
          - gosec
        path: _test\.go
      - linters:
          - revive
        path: _test\.go
      - linters:
          - wrapcheck
        path: _test\.go
      - linters:
          - wrapcheck
        path: internal/infra/
    paths:
      - .*\.pb\.go$
      - .*\.generated\.go$
      - vendor
      - node_modules
      - third_party$
      - builtin$
      - examples$
issues:
  max-issues-per-linter: 0
  max-same-issues: 0
  new: false
formatters:
  enable:
    - gofmt
    - goimports
  settings:
    gofmt:
      simplify: true
    goimports:
      local-prefixes:
        - raioz
  exclusions:
    generated: lax
    paths:
      - .*\.pb\.go$
      - .*\.generated\.go$
      - vendor
      - node_modules
      - third_party$
      - builtin$
      - examples$
