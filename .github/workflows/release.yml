name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: Run tests
        run: go test ./...

      # Single goreleaser invocation. The stamp verification runs as
      # a builds.hooks.post step inside .goreleaser.yml (see
      # scripts/verify-stamp.sh) — that aborts the whole release if
      # the linux/amd64 binary is unstamped, before archive/publish.
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
