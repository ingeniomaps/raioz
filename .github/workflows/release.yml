name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Triggers on semantic version tags (e.g., v1.0.0, v2.1.3)
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true
        type: string

env:
  GO_VERSION: '1.22'

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      attestations: write
      id-token: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for tags

      - name: Set up Go
        uses: actions/setup-go@v4
        with:
          go-version: ${{ env.GO_VERSION }}
          cache-dependency-path: go.sum

      - name: Set up GoReleaser
        uses: goreleaser/goreleaser-action@v5
        with:
          version: latest

      - name: Configure Git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Run GoReleaser
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # For manual dispatch, check if tag exists, if not create it
            VERSION="${{ github.event.inputs.version }}"
            if ! git rev-parse "$VERSION" >/dev/null 2>&1; then
              echo "Creating tag $VERSION"
              git tag "$VERSION"
              git push origin "$VERSION"
            else
              echo "Tag $VERSION already exists, using it"
              git checkout "$VERSION"
            fi
          fi
          goreleaser release --clean

      - name: Install GitHub CLI
        run: |
          type -p curl >/dev/null || (apt update && apt install curl -y)
          curl -fsSL https://cli.github.com/packages/githubcli-archive-keyring.gpg | dd of=/usr/share/keyrings/githubcli-archive-keyring.gpg \
          && chmod go+r /usr/share/keyrings/githubcli-archive-keyring.gpg \
          && echo "deb [arch=$(dpkg --print-architecture) signed-by=/usr/share/keyrings/githubcli-archive-keyring.gpg] https://cli.github.com/packages stable main" | tee /etc/apt/sources.list.d/github-cli.list > /dev/null \
          && apt update \
          && apt install gh -y

      - name: Build and upload direct binaries
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Authenticate GitHub CLI
          echo "$GITHUB_TOKEN" | gh auth login --with-token

          # Get the version tag
          VERSION="${GITHUB_REF#refs/tags/}"
          if [ -z "$VERSION" ] || [ "$VERSION" = "$GITHUB_REF" ]; then
            VERSION="${{ github.event.inputs.version }}"
          fi

          echo "Building direct binaries for version: $VERSION"

          # Build binaries for all platforms
          PLATFORMS="linux/amd64 linux/arm64 darwin/amd64 darwin/arm64"

          for PLATFORM in $PLATFORMS; do
            GOOS=$(echo $PLATFORM | cut -d'/' -f1)
            GOARCH=$(echo $PLATFORM | cut -d'/' -f2)
            BINARY_NAME="raioz-${GOOS}-${GOARCH}"

            echo "Building $BINARY_NAME..."

            # Get commit and date
            COMMIT=$(git rev-parse --short HEAD 2>/dev/null || echo "unknown")
            DATE=$(date +%Y-%m-%dT%H:%M:%S)

            # Build binary
            GOOS=$GOOS GOARCH=$GOARCH CGO_ENABLED=0 go build \
              -ldflags "-s -w -X 'raioz/cmd.Version=$VERSION' -X 'raioz/cmd.Commit=$COMMIT' -X 'raioz/cmd.BuildDate=$DATE'" \
              -o "$BINARY_NAME" ./cmd/raioz

            # Upload to GitHub release (wait a bit for GoReleaser to create the release)
            if [ -f "$BINARY_NAME" ]; then
              echo "Waiting for GoReleaser release to be ready..."
              sleep 5
              echo "Uploading $BINARY_NAME to release $VERSION..."
              gh release upload "$VERSION" "$BINARY_NAME" --clobber || echo "Warning: Failed to upload $BINARY_NAME (release may not be ready yet)"
            fi
          done

          echo "Direct binaries built and uploaded"
