name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2

      - name: Check file line count (400 max, excluding schema.go JSON blob)
        run: |
          bad=$(find . -name "*.go" ! -name "*_test.go" ! -name "schema.go" \
            ! -path "*/vendor/*" ! -path "*/.context/*" \
            -exec sh -c 'n=$(wc -l < "$1"); [ "$n" -gt 400 ] && echo "$1: $n lines"' _ {} \;)
          if [ -n "$bad" ]; then
            echo "❌ Files exceeding 400 lines found:"
            echo "$bad"
            exit 1
          fi
          echo "✅ All files are under 400 lines"

      - name: Check line length (120 chars max)
        run: |
          long=$(find . -name "*.go" ! -name "*_test.go" \
            ! -path "*/vendor/*" ! -path "*/.context/*" \
            -exec awk 'length > 120 {print FILENAME":"NR": "length($0)" chars"}' {} \;)
          if [ -n "$long" ]; then
            echo "❌ Lines exceeding 120 characters found:"
            echo "$long"
            exit 1
          fi
          echo "✅ All lines are under 120 characters"

      - name: Check i18n catalogs in sync
        run: make check-i18n

      - name: Check i18n source discipline (issue 058)
        run: make check-i18n-source

      - name: Check app-layer infra imports baseline (issue 049)
        run: make check-app-infra-imports

  test:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build
        run: make build
      - name: Cross-compile (windows + darwin)
        run: |
          # Smoke-test the goreleaser targets here so a Unix-only syscall
          # (issue 047 / v0.5.0 → v0.5.1 build failure) fails the PR
          # instead of the release. Build only — no test execution.
          GOOS=windows GOARCH=amd64 go build -o /tmp/raioz-win-amd64.exe ./cmd/raioz
          GOOS=windows GOARCH=arm64 go build -o /tmp/raioz-win-arm64.exe ./cmd/raioz
          GOOS=darwin  GOARCH=amd64 go build -o /tmp/raioz-mac-amd64    ./cmd/raioz
          GOOS=darwin  GOARCH=arm64 go build -o /tmp/raioz-mac-arm64    ./cmd/raioz
      - name: Test with race and coverage
        run: go test -race -coverprofile=coverage.out ./...
      - name: Coverage report
        run: go tool cover -func=coverage.out | grep total

  integration:
    name: Integration E2E
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Build and install
        run: make build && sudo cp raioz /usr/local/bin/
      - name: Create test project
        run: |
          mkdir -p /tmp/ci-test/api
          printf 'module example.com/api\ngo 1.22\n' > /tmp/ci-test/api/go.mod
          printf 'package main\nimport ("fmt";"log";"net/http")\nfunc main() {\n  http.HandleFunc("/", func(w http.ResponseWriter, r *http.Request) { fmt.Fprint(w, "ok") })\n  log.Fatal(http.ListenAndServe(":8080", nil))\n}\n' > /tmp/ci-test/api/main.go
      - name: Test init
        run: cd /tmp/ci-test && raioz init && test -f raioz.yaml
      - name: Test up
        run: cd /tmp/ci-test && raioz up && sleep 3 && curl -sf http://localhost:8080/
      - name: Test status
        run: cd /tmp/ci-test && raioz status
      - name: Test logs
        run: cd /tmp/ci-test && raioz logs api --tail 5
      - name: Test down
        run: cd /tmp/ci-test && raioz down && sleep 1 && ! curl -sf http://localhost:8080/ 2>/dev/null
      - name: Test up-down-up cycle (no orphans)
        run: cd /tmp/ci-test && raioz up && sleep 3 && curl -sf http://localhost:8080/ && raioz down

  release-dry-run:
    # Issue 056: goreleaser packaging-layer gate. The `test` job's
    # cross-compile step catches build-time forks (Unix-only syscalls,
    # missing build tags) but not packaging issues — bad archive
    # templates, broken changelog regex, hook script regressions, etc.
    # `goreleaser release --snapshot --clean --skip=publish,sign`
    # exercises the whole pipeline up to (but not including) the
    # GitHub release publish. Failures here mean a future `git tag v*`
    # would die in the same place — caught at PR time instead.
    name: Goreleaser dry-run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - uses: goreleaser/goreleaser-action@v7
        with:
          version: '~> v2'
          args: release --snapshot --clean --skip=publish,sign
      - name: Upload snapshot artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: goreleaser-snapshot-dist
          path: dist/
          retention-days: 7

  test-windows:
    # Issue 050: runtime-behavior gate on Windows. The cross-compile
    # check in `test` catches build-time forks (e.g. v0.5.1's
    # syscall.Flock regression); this job catches differences that
    # only surface when the binary actually runs — os.Rename
    # semantics, LockFileEx vs Flock, taskkill vs Setpgid, XDG path
    # fallbacks, etc. Scope: the OS-sensitive packages only, so the
    # job stays under the Linux-suite wall-clock. Gated on push so
    # PRs don't pay the slower Windows runner; the cross-compile
    # gate still runs on every PR.
    name: Unit tests (Windows, OS-sensitive packages)
    runs-on: windows-latest
    if: github.event_name == 'push'
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-go@v6
        with:
          go-version: '1.26'
      - name: Test OS-sensitive packages
        shell: bash
        run: |
          go test ./internal/naming/... \
                  ./internal/host/... \
                  ./internal/audit/... \
                  ./internal/workspace/... \
                  ./internal/proxy/... \
                  ./internal/lock/... \
                  ./internal/ignore/...
